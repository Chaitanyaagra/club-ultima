<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Ultima - Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f6f9; margin: 0; padding: 20px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #003399;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 24px; }
        
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .search-box {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }
        .refresh-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .refresh-btn:hover { background-color: #218838; }

        /* Table Styling */
        .table-container {
            background: white;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        thead {
            background-color: #003399;
            color: white;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }
        th { font-size: 14px; text-transform: uppercase; }
        td { font-size: 14px; color: #333; }
        tr:hover { background-color: #f1f1f1; }
        
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .btn-view {
            background-color: #17a2b8;
            color: white;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-view:hover { background-color: #138496; }
        
        .btn-pdf {
            background-color: #fd7e14; /* Orange color for PDF */
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-pdf:hover { background-color: #e86e04; }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CLUB ULTIMA - Admin Dashboard</h1>
        <div>Total Forms: <span id="total_count">0</span></div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Search by Name, Flat, or ID..." onkeyup="searchTable()">
        <button class="refresh-btn" onclick="fetchData()">🔄 Refresh Data</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Form ID</th>
                    <th>Date</th>
                    <th>Resident Name</th>
                    <th>Flat / Tower</th>
                    <th>Mobile</th>
                    <th>ID Proof</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="7" style="text-align: center; padding: 20px;">Loading data from Firebase...</td>
                </tr>
            </tbody>
        </table>
    </div>

<script>
    // 1. Firebase Configuration Initialize
    const firebaseConfig = {
      apiKey: "AIzaSyBFepRlnHgfjyCpmDtW7ovF_vGQ4blCL7k",
      authDomain: "club-ultima.firebaseapp.com",
      projectId: "club-ultima",
      storageBucket: "club-ultima.firebasestorage.app",
      messagingSenderId: "942405392960",
      appId: "1:942405392960:web:63df8788cd1c82e734dda5"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    // Global variable to hold user data for PDF generation
    let residentDataMap = {};

    // 2. Fetch Data from Firestore
    async function fetchData() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">Fetching Data...</td></tr>';
        
        try {
            const snapshot = await db.collection("consent_forms").orderBy("timestamp", "desc").get();
            tableBody.innerHTML = ''; 
            residentDataMap = {}; // Clear previous data
            let count = 0;

            if(snapshot.empty) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">No forms submitted yet.</td></tr>';
                document.getElementById('total_count').innerText = "0";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                residentDataMap[doc.id] = data; // Store data locally for PDF generator
                count++;
                
                const row = `
                    <tr>
                        <td><strong>${data.form_id || 'N/A'}</strong></td>
                        <td>${data.date || 'N/A'}</td>
                        <td>${data.resident_name || 'N/A'}</td>
                        <td>${data.flat_no || ''} / ${data.tower || ''}</td>
                        <td>${data.mobile || 'N/A'}</td>
                        <td>
                            ${data.id_proof_url ? 
                                `<a href="${data.id_proof_url}" target="_blank" class="btn-view">👀 View ID</a>` : 
                                'No File'}
                        </td>
                        <td class="action-buttons">
                            <button class="btn-pdf" onclick="generateAdminPDF('${doc.id}')">📄 PDF</button>
                            <button class="btn-delete" onclick="deleteRecord('${doc.id}')">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            document.getElementById('total_count').innerText = count;

        } catch (error) {
            console.error("Error fetching data:", error);
            tableBody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 20px; color: red;">Error loading data.</td></tr>`;
        }
    }

    // 3. Admin PDF Generator Function
    function generateAdminPDF(docId) {
        const data = residentDataMap[docId];
        if (!data) {
            alert("Error: Data not found for this user.");
            return;
        }

        alert(`Generating PDF for ${data.resident_name}... Please wait.`);

        // Exact same HTML template used in the frontend form
        const pdfHTML = `
            <div style="padding: 30px; font-family: Arial, sans-serif; color: #333; background: #fff; width: 100%;">
                <div style="text-align: center; border-bottom: 2px solid #003399; padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="color: #003399; margin: 0;">CLUB ULTIMA</h2>
                    <h3 style="color: #555; margin: 5px 0;">SWIMMING POOL CONSENT RECEIPT</h3>
                </div>
                
                <div style="margin-bottom: 15px; font-size: 14px;">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Registration ID:</strong> <span>${data.form_id || 'N/A'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Date:</strong> <span>${data.date || 'N/A'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Resident Name:</strong> <span>${data.resident_name || 'N/A'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Flat / Unit No:</strong> <span>${data.flat_no || 'N/A'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Tower:</strong> <span>${data.tower || 'N/A'}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd;">
                        <strong>Mobile No:</strong> <span>${data.mobile || 'N/A'}</span>
                    </div>
                </div>

                <div style="margin-top: 30px; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9;">
                    <p style="font-size: 12px; line-height: 1.5; margin: 0;">
                        <strong>Declaration:</strong> I acknowledge that I have read and accepted all terms and conditions regarding swimming pool safety. I understand there is no life guard on duty and I am using the pool at my own risk.
                    </p>
                    <p style="margin-top: 15px; font-size: 13px;"><strong>Digitally Signed By:</strong> ${data.resident_name || 'N/A'}</p>
                </div>
            </div>
        `;

        const opt = {
            margin: 0.5,
            filename: `Consent_Form_${data.form_id}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        
        // Generate and Download PDF
        html2pdf().set(opt).from(pdfHTML).save();
    }

    // 4. Delete Record Function
    async function deleteRecord(docId) {
        if(confirm("Are you sure you want to delete this record?")) {
            try {
                await db.collection("consent_forms").doc(docId).delete();
                alert("Record deleted successfully!");
                fetchData(); 
            } catch (error) {
                console.error("Error deleting document: ", error);
                alert("Failed to delete record.");
            }
        }
    }

    // 5. Live Search Functionality
    function searchTable() {
        const input = document.getElementById("searchInput");
        const filter = input.value.toUpperCase();
        const table = document.getElementById("dataTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].innerText;
            if (rowText.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }

    // Load data automatically
    window.onload = fetchData;
</script>

</body>
</html>
